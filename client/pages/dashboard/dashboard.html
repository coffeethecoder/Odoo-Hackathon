<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AssetFlow - Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="app-container">
    <header class="top-header">
      <div class="header-left">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle Menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div class="logo">
          <h1>AssetFlow</h1>
        </div>
      </div>
    </header>

    <div class="layout-wrapper">
      
      <div class="overlay" id="sidebar-overlay"></div>

      <nav class="sidebar" id="sidebar">
        <ul class="nav-list" id="nav-list">
          <li class="nav-item active"><a href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a href="../organization/organization.html">Organization setup</a></li>
          <li class="nav-item"><a href="../assetRegistration/assetRegPage.html">Assets</a></li>
          <li class="nav-item"><a href="#">Allocation & Transfer</a></li>
          <li class="nav-item"><a href="#">Resource Booking</a></li>
          <li class="nav-item"><a href="../maintainanceManage/maintainanceManage.html">Maintenance</a></li>
          <li class="nav-item"><a href="#">Audit</a></li>
          <li class="nav-item"><a href="#">Reports</a></li>
          <li class="nav-item"><a href="#">Notifications</a></li>
        </ul>
      </nav>

      <main class="main-content">
        <section class="section-header">
          <h2>Today's Overview</h2>
        </section>

        <div class="kpi-grid">
          <div class="kpi-card">
            <span class="kpi-label">Available</span>
            <span class="kpi-value">0</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-label">Allocated</span>
            <span class="kpi-value">0</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-label">Maintenance Today</span>
            <span class="kpi-value">0</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-label">Active Bookings</span>
            <span class="kpi-value">0</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-label">Pending Transfers</span>
            <span class="kpi-value">0</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-label">Upcoming returns</span>
            <span class="kpi-value">0</span>
          </div>
        </div>


        <div class="action-buttons">
          <button class="btn btn-primary" onclick="alert('Registering asset...')">+ register asset</button>
          <button class="btn btn-secondary" onclick="alert('Opening resource booking...')">Book resource</button>
          <button class="btn btn-secondary" onclick="alert('Raising maintenance request...')">Raise requests</button>
        </div>

      </main>
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
