<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AssetFlow | Sign In</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>
<div id="toast" class="toast"></div>

<div class="container">

     <div class="left">

        <div class="logo">
            Asset<span>Flow</span>
        </div>

    </div>

    <div class="right">

        <h2>Welcome Back</h2>

        <p class="subtitle">
            Sign in with your official company account.
        </p>

       <form id="loginForm">

            <div class="input-group">

                <label for="employee_id">Employee ID</label>

                <input
                    type="text"
                    id="employee_id"
                    name="employee_id"
                    placeholder="EMP1001"
                    required>

            </div>

            <div class="input-group">

                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

              
                
            </div>

            <div class="options">

                <a href="forgot-password.html" class="forgot">
                    Forgot Password?
                </a>

            </div>

            <button type="submit">
                Sign In
            </button>

        </form>

        <div class="login">

            Don't have an account?

            <a href="signin.html">
                Create Account
            </a>

        </div>

    </div>

</div>

</body>
<script src="login.js"></script>
</html>
